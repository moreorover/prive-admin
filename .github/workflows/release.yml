name: Release

on:
  release:
    types:
      - published

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BASE: ghcr.io/${{ github.repository }}

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      commit: ${{ steps.release.outputs.commit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release tag
        id: release
        run: |
          set -euo pipefail
          if ! printf '%s' "${GITHUB_REF_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Release tags must match vMAJOR.MINOR.PATCH, got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          git fetch --no-tags origin main:refs/remotes/origin/main
          RELEASE_COMMIT="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          if ! git merge-base --is-ancestor "${RELEASE_COMMIT}" origin/main; then
            echo "Release tag ${GITHUB_REF_NAME} must point to a commit on main" >&2
            exit 1
          fi

          echo "commit=${RELEASE_COMMIT}" >> "${GITHUB_OUTPUT}"

  promote-release:
    name: Promote ${{ matrix.image }} Release Image
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - web
          - server
          - migrate
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote commit images
        run: |
          set -euo pipefail
          image="${{ matrix.image }}"
          source_image="${IMAGE_NAME_BASE}-${image}:${{ needs.validate-release.outputs.commit }}"
          for attempt in $(seq 1 20); do
            if docker buildx imagetools inspect "${source_image}" > /dev/null; then
              break
            fi
            if [ "${attempt}" -eq 20 ]; then
              echo "Image ${source_image} was not found in GHCR after waiting" >&2
              exit 1
            fi
            echo "Waiting for ${source_image} to be available in GHCR (${attempt}/20)"
            sleep 15
          done
          docker buildx imagetools create \
            -t "${IMAGE_NAME_BASE}-${image}:${GITHUB_REF_NAME}" \
            -t "${IMAGE_NAME_BASE}-${image}:latest" \
            "${source_image}"

  pre-deploy-backup:
    name: Pre-deploy Postgres Backup
    needs: promote-release
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://prive.salon
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          POSTGRES_DB: op://prive-admin/prive-admin-prod/server/POSTGRES_DB
          POSTGRES_USER: op://prive-admin/prive-admin-prod/server/POSTGRES_USER
          R2_ACCOUNT_ID: op://prive-admin/Cloudflare R2/account-id
          R2_ACCESS_KEY_ID: op://prive-admin/Cloudflare R2/access-key-id
          R2_SECRET_ACCESS_KEY: op://prive-admin/Cloudflare R2/secret-access-key
          R2_BUCKET_NAME: op://prive-admin/Cloudflare R2/bucket-name
          TS_OAUTH_CLIENT_ID: op://prive-admin/tailscale-oauth/client-id
          TS_OAUTH_CLIENT_SECRET: op://prive-admin/tailscale-oauth/client-secret

      - name: Tailscale up
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:prod-server

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 0700 ~/.ssh
          ssh-keyscan -H prive >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Copy backup script to VPS
        run: scp scripts/backup_postgres.sh root@prive:~/backup_postgres.sh

      - name: Run backup script on VPS
        run: |
          # Sanitize ref names like "feature/foo" → "feature-foo" so the
          # label matches BACKUP_LABEL's allowed charset.
          BACKUP_LABEL=$(printf '%s' "${GITHUB_REF_NAME}" | tr '/' '-')
          ssh root@prive "
            chmod +x ~/backup_postgres.sh && \
            PG_USER='${POSTGRES_USER}' \
            PG_DATABASE='${POSTGRES_DB}' \
            BACKUP_LABEL='${BACKUP_LABEL}' \
            ~/backup_postgres.sh"

      - name: Install s3cmd
        run: |
          sudo apt-get update -y
          sudo apt-get install -y s3cmd

      - name: Upload backup to Cloudflare R2
        run: |
          set -e
          umask 077
          FILE_NAME=$(ssh root@prive 'ls -t ~/db_backups/ | head -n1')
          [ -n "${FILE_NAME}" ] || { echo "no backup file produced on VPS"; exit 1; }
          ssh root@prive "cat ~/db_backups/${FILE_NAME}" > "${FILE_NAME}"
          cat > ~/.s3cfg <<EOF
          [default]
          access_key = ${R2_ACCESS_KEY_ID}
          secret_key = ${R2_SECRET_ACCESS_KEY}
          host_base = ${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
          host_bucket = %(bucket)s.${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
          bucket_location = auto
          use_https = True
          EOF
          s3cmd put "${FILE_NAME}" "s3://${R2_BUCKET_NAME}/postgres_backup/${FILE_NAME}"
          echo "Uploaded ${FILE_NAME} to r2://${R2_BUCKET_NAME}/postgres_backup/${FILE_NAME}"

  deploy:
    name: Deploy to prive
    needs: [promote-release, pre-deploy-backup]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://prive.salon
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          POSTGRES_DB: op://prive-admin/prive-admin-prod/server/POSTGRES_DB
          POSTGRES_USER: op://prive-admin/prive-admin-prod/server/POSTGRES_USER
          POSTGRES_PASSWORD: op://prive-admin/prive-admin-prod/server/POSTGRES_PASSWORD
          DATABASE_URL: op://prive-admin/prive-admin-prod/server/DATABASE_URL
          BETTER_AUTH_SECRET: op://prive-admin/prive-admin-prod/server/BETTER_AUTH_SECRET
          BETTER_AUTH_URL: op://prive-admin/prive-admin-prod/server/BETTER_AUTH_URL
          CORS_ORIGIN: op://prive-admin/prive-admin-prod/server/CORS_ORIGIN
          R2_ENDPOINT: op://prive-admin/Cloudflare R2/endpoint
          R2_ACCESS_KEY_ID: op://prive-admin/Cloudflare R2/access-key-id
          R2_SECRET_ACCESS_KEY: op://prive-admin/Cloudflare R2/secret-access-key
          R2_BUCKET_NAME: op://prive-admin/Cloudflare R2/bucket-name
          DOMAIN_NAME: op://prive-admin/prive-admin-prod/server/DOMAIN_NAME
          ACME_EMAIL: op://prive-admin/prive-admin-prod/server/ACME_EMAIL
          TS_OAUTH_CLIENT_ID: op://prive-admin/tailscale-oauth/client-id
          TS_OAUTH_CLIENT_SECRET: op://prive-admin/tailscale-oauth/client-secret

      - name: Render .env
        run: |
          umask 077
          cat > .env <<EOF
          IMAGE_TAG=${GITHUB_REF_NAME}
          GITHUB_REPOSITORY=${GITHUB_REPOSITORY}
          NODE_ENV=production
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          DATABASE_URL=${DATABASE_URL}
          BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
          BETTER_AUTH_URL=${BETTER_AUTH_URL}
          CORS_ORIGIN=${CORS_ORIGIN}
          R2_ENDPOINT=${R2_ENDPOINT}
          R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
          R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
          R2_BUCKET_NAME=${R2_BUCKET_NAME}
          DOMAIN_NAME=${DOMAIN_NAME}
          ACME_EMAIL=${ACME_EMAIL}
          EOF
          chmod 600 .env

      - name: Tailscale up
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:prod-server

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 0700 ~/.ssh
          ssh-keyscan -H prive >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Verify SSH connection
        run: ssh -o ConnectTimeout=30 root@prive 'echo ok'

      - name: Stage files on VPS
        run: |
          ssh root@prive 'mkdir -p ~/prive-admin'
          scp docker-compose.yml Caddyfile .env root@prive:~/prive-admin/
          ssh root@prive 'set -e; ts_ip=$(tailscale ip -4 | head -n1); [ -n "$ts_ip" ] || { echo "tailscale ip unavailable"; exit 1; }; printf "TAILSCALE_IP=%s\n" "$ts_ip" >> ~/prive-admin/.env'

      - name: Deploy stack
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          printf '%s' "${GH_TOKEN}" | ssh root@prive \
            "cd ~/prive-admin && \
             docker login ghcr.io -u '${GH_ACTOR}' --password-stdin && \
             docker compose pull && \
             docker compose up -d --remove-orphans --wait --wait-timeout 120 && \
             docker image prune -f"

      - name: Smoke check
        run: |
          for i in $(seq 1 10); do
            if curl -fsS --max-time 10 "https://${DOMAIN_NAME}/" > /dev/null; then
              echo "smoke check ok"
              exit 0
            fi
            echo "attempt $i failed, retrying in 15s"
            sleep 15
          done
          echo "smoke check failed after 10 attempts"
          exit 1
