name: PR Labeler

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  label:
    name: Label PR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Apply labels
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
