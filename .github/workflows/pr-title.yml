name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  lint:
    name: Lint PR title (Conventional Commits)
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.ref != 'release-please--branches--main'
    permissions:
      pull-requests: read

    steps:
      - name: Validate
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            ci
            docs
            refactor
            perf
            test
            build
            style
            revert
          requireScope: false
          subjectPattern: ^[A-Za-z].+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}" must
            start with a letter and contain at least two characters.
