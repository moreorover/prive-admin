name: React Doctor

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  react-doctor:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run React Doctor
        uses: millionco/react-doctor@main
        with:
          diff: main
          fail-on: error
          github-token: ${{ secrets.GITHUB_TOKEN }}
