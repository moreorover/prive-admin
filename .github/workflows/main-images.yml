name: Main Images

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BASE: ghcr.io/${{ github.repository }}

jobs:
  build-push:
    name: Build and Push ${{ matrix.image }} Main Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: web
            dockerfile: apps/web/Dockerfile
          - image: server
            dockerfile: apps/server/Dockerfile
          - image: migrate
            dockerfile: packages/db/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          file: ${{ matrix.dockerfile }}
          context: .
          platforms: linux/amd64
          load: true
          tags: |
            ${{ env.IMAGE_NAME_BASE }}-${{ matrix.image }}:${{ github.sha }}
            ${{ env.IMAGE_NAME_BASE }}-${{ matrix.image }}:main
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Push image
        run: |
          set -euo pipefail
          image="${{ matrix.image }}"
          docker image push "${IMAGE_NAME_BASE}-${image}:${GITHUB_SHA}"
          docker image push "${IMAGE_NAME_BASE}-${image}:main"
