name: Nightly Dependency Updates

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  taze:
    name: Run taze major
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Load PAT from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          DEPS_PAT: op://prive-admin/PAT prive-admin deps bot/token

      - name: Run taze major
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          shell: bash
          command: |
            set -o pipefail
            log=$(mktemp)
            bunx taze major -r -w --concurrency 3 2>&1 | tee "$log"
            if grep -q 'Timeout requesting' "$log"; then
              echo "::warning::taze hit registry timeouts; failing step to trigger retry"
              exit 1
            fi

      - name: Update Lockfile
        run: bun install

      - name: Create or Update Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ env.DEPS_PAT }}
          branch: chore/auto-dep-updates
          base: main
          commit-message: "fix(deps): bump dependencies via taze major"
          title: "fix(deps): nightly dependency updates"
          body: |
            Automated nightly run of `bunx taze major -r -w` followed by `bun install`.

            This PR is updated each night with any newly outdated packages until merged or closed.
          labels: dependencies
          delete-branch: true
