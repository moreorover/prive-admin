name: Nightly Dependency Updates

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  taze:
    name: Run taze major
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Load PAT from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          DEPS_PAT: op://prive-admin/PAT prive-admin deps bot/token

      - name: Run taze major
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          shell: bash
          command: |
            set -eo pipefail
            log=$(mktemp)
            vp dlx taze major -r -w --maturity-period 7 --concurrency 3 2>&1 | tee "$log"
            if grep -q 'Timeout requesting' "$log"; then
              echo "::warning::taze hit registry timeouts for one or more packages; continuing with resolved updates"
            fi

      - name: Update Lockfile
        run: vp install --no-frozen-lockfile

      - name: Create or Update Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ env.DEPS_PAT }}
          branch: chore/auto-dep-updates
          base: main
          commit-message: "fix(deps): bump dependencies via taze major"
          title: "fix(deps): nightly dependency updates"
          body: |
            Automated nightly run of `vp dlx taze major -r -w` followed by `vp install`.

            This PR is updated each night with any newly outdated packages until merged or closed.
          labels: dependencies
          delete-branch: true
