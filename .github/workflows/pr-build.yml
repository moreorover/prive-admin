name: PR Build Check

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Source Build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install Dependencies
        run: vp install --frozen-lockfile

      - name: Check
        run: vp check

      - name: Check Types
        run: vp run check-types

      - name: Run Knip
        run: vp exec knip --reporter github-actions

      - name: Run Build
        run: vp run build

  docker-build:
    name: Docker Image Build (${{ matrix.image.name }})
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: web
            file: apps/web/Dockerfile
            tag: prive-admin-web
          - name: server
            file: apps/server/Dockerfile
            tag: prive-admin-server
          - name: migrate
            file: packages/db/Dockerfile
            tag: prive-admin-migrate

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image.name }} image (no push)
        uses: docker/build-push-action@v6
        with:
          file: ${{ matrix.image.file }}
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ matrix.image.tag }}:pr-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
