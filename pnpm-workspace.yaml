packages:
  - apps/*
  - packages/*

onlyBuiltDependencies:
  - esbuild

catalogMode: prefer

catalog:
  "@hono/node-server": ^2.0.8
  "@hono/trpc-server": ^0.4.2
  "@trpc/client": ^11.18.0
  "@trpc/server": ^11.18.0
  "@trpc/tanstack-react-query": ^11.18.0
  "@types/node": ^26.1.1
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  better-auth: ^1.6.23
  dotenv: ^17.4.2
  hono: ^4.12.30
  react: ^19.2.7
  react-dom: ^19.2.7
  tsdown: ^0.22.7
  tsx: ^4.23.1
  typescript: ^7.0.2
  vite: npm:@voidzero-dev/vite-plus-core@0.2.2
  vite-plus: 0.2.2
  zod: ^4.4.3

overrides:
  vite: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: "*"

allowBuilds:
  esbuild: true
