<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privé</title>
    <script>
      ;(function () {
        try {
          var scheme = window.localStorage.getItem("mantine-color-scheme-value") || "auto"
          var resolved =
            scheme === "auto"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : scheme
          document.documentElement.dataset.mantineColorScheme = resolved
        } catch (_) {
          document.documentElement.dataset.mantineColorScheme = "light"
        }
      })()
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
